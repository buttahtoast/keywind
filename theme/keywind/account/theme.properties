# Production Account Console is Keycloak v3 (React SPA).
# styles/scripts below are injected into that SPA for de-branding + Keywind look.
#
# FreeMarker pages in this directory (account.ftl, password.ftl, …) are the
# Keywind Account Console design system used for local mock preview
# (npm run mock:generate + npm run dev). They are not the SPA runtime.
parent=keycloak.v3
deprecatedMode=false

