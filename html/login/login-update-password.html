<html lang="en">
  <head>
    <title>Sign in to Keywind</title>
    <meta charset="utf-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/src/index.css" rel="stylesheet">
    <script defer src="/src/index.ts" type="module"></script>
  </head>
  <body class="text-[var(--kw-text)] antialiased flex flex-col font-sans items-center justify-center min-h-screen overflow-hidden px-4 py-12 sm:py-20 relative">
    <!-- Clean animated landscape background -->
    <div class="landscape absolute inset-0 z-[-1]" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-full h-full" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
        <!-- Sun --> <circle cx="1080" cy="165" r="68" class="sun-glow" /> <circle cx="1080" cy="165" r="42" class="sun" /> <!-- Clouds (drifting) --> <!-- Cloud 1 - slow --> <g class="cloud cloud-slow" style="animation-delay: -25s;">
          <ellipse cx="180" cy="142" rx="68" ry="23" />
          <ellipse cx="245" cy="128" rx="52" ry="31" />
          <ellipse cx="295" cy="145" rx="58" ry="22" />
          <ellipse cx="155" cy="155" rx="32" ry="16" />
        </g> <!-- Cloud 2 - medium --> <g class="cloud cloud-medium" style="animation-delay: -52s;">
          <ellipse cx="420" cy="98" rx="52" ry="18" />
          <ellipse cx="475" cy="86" rx="42" ry="25" />
          <ellipse cx="515" cy="102" rx="48" ry="17" />
        </g> <!-- Cloud 3 - slow --> <g class="cloud cloud-slow" style="animation-delay: -8s;">
          <ellipse cx="720" cy="155" rx="75" ry="26" />
          <ellipse cx="800" cy="138" rx="58" ry="35" />
          <ellipse cx="860" cy="158" rx="62" ry="24" />
          <ellipse cx="680" cy="168" rx="35" ry="18" />
        </g> <!-- Cloud 4 - fast-ish --> <g class="cloud cloud-fast" style="animation-delay: -38s;">
          <ellipse cx="1020" cy="82" rx="45" ry="16" />
          <ellipse cx="1065" cy="72" rx="36" ry="22" />
          <ellipse cx="1100" cy="85" rx="40" ry="15" />
        </g> <!-- Subtle mist layer --> <rect x="0" y="320" width="1440" height="480" class="mist" /> <!-- Layered rolling hills (clean, minimal) --> <!-- Far hills --> <path d="M0,420 Q160,325 340,395 Q510,305 720,380 Q910,310 1090,370 Q1250,320 1440,385 L1440,800 L0,800 Z" class="hill-far" /> <!-- Mid hills --> <path d="M0,490 Q200,410 410,475 Q620,395 850,460 Q1050,400 1240,455 Q1380,415 1440,460 L1440,800 L0,800 Z" class="hill-mid" /> <!-- Front hill --> <path d="M0,560 Q280,485 510,545 Q780,470 1030,530 Q1260,475 1440,525 L1440,800 L0,800 Z" class="hill-front" />
      </svg>
    </div>
    <div class="max-w-[26rem] space-y-6 w-full">
      <div class="bg-[var(--kw-surface)] p-8 rounded-2xl shadow-xl shadow-black/5 dark:shadow-black/20 space-y-6">
        <div class="space-y-4 text-center">
          <div class="flex flex-col items-center gap-3">
            <div class="flex items-center justify-center gap-2">
              <svg class="h-6 w-6 text-[var(--kw-text)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" />
              </svg>
              <div class="font-semibold text-2xl tracking-[-0.02em] text-[var(--kw-text)]">
                Keywind
              </div>
            </div>
          </div>
          <h1 class="font-semibold text-[var(--kw-text)] text-center text-xl tracking-tight">Update password</h1>
        </div>
        <div class="space-y-5">
          <div class="bg-red-50 text-red-700 dark:bg-red-950/60 dark:text-red-400 px-4 py-3 rounded-2xl text-sm" role="alert">
            Example of an error message
          </div>
          <form class="m-0 space-y-5" method="post" action="#loginAction">
            <input autocomplete="username" name="username" type="hidden" value="Username"> <input autocomplete="current-password" name="password" type="hidden">
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-[var(--kw-text)]" for="password-new"> New Password </label>
              <div class="relative" x-data="{ show: false }">
                <input autofocus required aria-invalid="false" class="block w-full rounded-2xl border border-[var(--kw-border)] bg-[var(--kw-surface)] px-4 py-3 text-[var(--kw-text)] placeholder:text-[var(--kw-text-subtle)] focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500/30 sm:text-sm transition-colors" id="password-new" name="password-new" placeholder="New Password" :type="show ? 'text' : 'password'" autocomplete="new-password"> <button @click="show = !show" aria-controls="password-new" :aria-expanded="show" class="absolute right-4 top-3.5 text-[var(--kw-text-subtle)] hover:text-[var(--kw-text-muted)] transition-colors" type="button">
                  <div x-show="!show">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                      <path d="M10 12.5C11.3807 12.5 12.5 11.3807 12.5 10C12.5 8.61929 11.3807 7.5 10 7.5C8.61929 7.5 7.5 8.61929 7.5 10C7.5 11.3807 8.61929 12.5 10 12.5Z" /> <path clip-rule="evenodd" d="M0.664255 10.5904C0.517392 10.2087 0.517518 9.78563 0.66461 9.40408C2.10878 5.65788 5.7433 3 9.99859 3C14.256 3 17.892 5.66051 19.3347 9.40962C19.4816 9.79127 19.4814 10.2144 19.3344 10.5959C17.8902 14.3421 14.2557 17 10.0004 17C5.74298 17 2.10698 14.3395 0.664255 10.5904ZM14.0004 10C14.0004 12.2091 12.2095 14 10.0004 14C7.79123 14 6.00037 12.2091 6.00037 10C6.00037 7.79086 7.79123 6 10.0004 6C12.2095 6 14.0004 7.79086 14.0004 10Z" fill-rule="evenodd" />
                    </svg>
                  </div>
                  <div x-cloak x-show="show">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                      <path clip-rule="evenodd" d="M3.28033 2.21967C2.98744 1.92678 2.51256 1.92678 2.21967 2.21967C1.92678 2.51256 1.92678 2.98744 2.21967 3.28033L16.7197 17.7803C17.0126 18.0732 17.4874 18.0732 17.7803 17.7803C18.0732 17.4874 18.0732 17.0126 17.7803 16.7197L16.0352 14.9745C17.5064 13.8594 18.6595 12.3465 19.3344 10.5959C19.4814 10.2144 19.4816 9.79127 19.3347 9.40962C17.892 5.66051 14.256 3 9.99859 3C8.28207 3 6.66657 3.43249 5.2551 4.19444L3.28033 2.21967ZM7.75194 6.69128L8.84367 7.78301C9.18951 7.60223 9.58291 7.5 10.0002 7.5C11.3809 7.5 12.5002 8.61929 12.5002 10C12.5002 10.4173 12.398 10.8107 12.2172 11.1565L13.3091 12.2484C13.7454 11.6077 14.0004 10.8336 14.0004 10C14.0004 7.79086 12.2095 6 10.0004 6C9.16675 6 8.39268 6.25501 7.75194 6.69128Z" fill-rule="evenodd" /> <path d="M10.7484 13.9302L13.2711 16.4529C12.2462 16.8074 11.1458 17 10.0004 17C5.74298 17 2.10698 14.3395 0.664255 10.5904C0.517392 10.2087 0.517518 9.78563 0.66461 9.40408C1.15603 8.12932 1.90108 6.98057 2.83791 6.01969L6.0702 9.25198C6.02436 9.4943 6.00037 9.74435 6.00037 10C6.00037 12.2091 7.79123 14 10.0004 14C10.256 14 10.5061 13.976 10.7484 13.9302Z" />
                    </svg>
                  </div></button>
              </div>
              <div class="text-red-500 text-sm">
              </div>
            </div>
            <div class="space-y-1.5">
              <label class="block text-sm font-medium text-[var(--kw-text)]" for="password-confirm"> Confirm password </label>
              <div class="relative" x-data="{ show: false }">
                <input required aria-invalid="false" class="block w-full rounded-2xl border border-[var(--kw-border)] bg-[var(--kw-surface)] px-4 py-3 text-[var(--kw-text)] placeholder:text-[var(--kw-text-subtle)] focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500/30 sm:text-sm transition-colors" id="password-confirm" name="password-confirm" placeholder="Confirm password" :type="show ? 'text' : 'password'" autocomplete="new-password"> <button @click="show = !show" aria-controls="password-confirm" :aria-expanded="show" class="absolute right-4 top-3.5 text-[var(--kw-text-subtle)] hover:text-[var(--kw-text-muted)] transition-colors" type="button">
                  <div x-show="!show">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                      <path d="M10 12.5C11.3807 12.5 12.5 11.3807 12.5 10C12.5 8.61929 11.3807 7.5 10 7.5C8.61929 7.5 7.5 8.61929 7.5 10C7.5 11.3807 8.61929 12.5 10 12.5Z" /> <path clip-rule="evenodd" d="M0.664255 10.5904C0.517392 10.2087 0.517518 9.78563 0.66461 9.40408C2.10878 5.65788 5.7433 3 9.99859 3C14.256 3 17.892 5.66051 19.3347 9.40962C19.4816 9.79127 19.4814 10.2144 19.3344 10.5959C17.8902 14.3421 14.2557 17 10.0004 17C5.74298 17 2.10698 14.3395 0.664255 10.5904ZM14.0004 10C14.0004 12.2091 12.2095 14 10.0004 14C7.79123 14 6.00037 12.2091 6.00037 10C6.00037 7.79086 7.79123 6 10.0004 6C12.2095 6 14.0004 7.79086 14.0004 10Z" fill-rule="evenodd" />
                    </svg>
                  </div>
                  <div x-cloak x-show="show">
                    <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                      <path clip-rule="evenodd" d="M3.28033 2.21967C2.98744 1.92678 2.51256 1.92678 2.21967 2.21967C1.92678 2.51256 1.92678 2.98744 2.21967 3.28033L16.7197 17.7803C17.0126 18.0732 17.4874 18.0732 17.7803 17.7803C18.0732 17.4874 18.0732 17.0126 17.7803 16.7197L16.0352 14.9745C17.5064 13.8594 18.6595 12.3465 19.3344 10.5959C19.4814 10.2144 19.4816 9.79127 19.3347 9.40962C17.892 5.66051 14.256 3 9.99859 3C8.28207 3 6.66657 3.43249 5.2551 4.19444L3.28033 2.21967ZM7.75194 6.69128L8.84367 7.78301C9.18951 7.60223 9.58291 7.5 10.0002 7.5C11.3809 7.5 12.5002 8.61929 12.5002 10C12.5002 10.4173 12.398 10.8107 12.2172 11.1565L13.3091 12.2484C13.7454 11.6077 14.0004 10.8336 14.0004 10C14.0004 7.79086 12.2095 6 10.0004 6C9.16675 6 8.39268 6.25501 7.75194 6.69128Z" fill-rule="evenodd" /> <path d="M10.7484 13.9302L13.2711 16.4529C12.2462 16.8074 11.1458 17 10.0004 17C5.74298 17 2.10698 14.3395 0.664255 10.5904C0.517392 10.2087 0.517518 9.78563 0.66461 9.40408C1.15603 8.12932 1.90108 6.98057 2.83791 6.01969L6.0702 9.25198C6.02436 9.4943 6.00037 9.74435 6.00037 10C6.00037 12.2091 7.79123 14 10.0004 14C10.256 14 10.5061 13.976 10.7484 13.9302Z" />
                    </svg>
                  </div></button>
              </div>
              <div class="text-red-500 text-sm">
              </div>
            </div>
            <div class="flex flex-col space-y-2 pt-2">
              <button class="bg-primary-600 text-white hover:bg-primary-700 active:bg-primary-800 px-5 py-3 text-sm flex font-medium gap-2 items-center justify-center relative rounded-2xl transition-all w-full focus:outline-none focus:ring-2 focus:ring-primary-500/40" type="submit"> Submit </button>
            </div>
          </form>
          <form action="#loginAction" method="post">
            <input name="tryAnotherWay" type="hidden" value="on"> <button class="bg-transparent text-[var(--kw-text-muted)] hover:bg-[var(--kw-surface-muted)] hover:text-[var(--kw-text)] px-5 py-3 text-sm flex font-medium gap-2 items-center justify-center relative rounded-2xl transition-all w-full focus:outline-none focus:ring-2 focus:ring-primary-500/40" type="submit"> Try Another Way </button>
          </form>
        </div>
      </div>
      <nav class="flex items-center justify-center">
        <div class="relative" x-data="{ open: false }">
          <button class="text-[var(--kw-text-muted)] hover:text-[var(--kw-text)] inline-flex transition-colors" @click="open = !open" type="button">
            <div class="flex items-center">
              <span class="mr-1 text-sm">English</span>
              <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                <path clip-rule="evenodd" d="M5.23017 7.20938C5.52875 6.92228 6.00353 6.93159 6.29063 7.23017L10 11.1679L13.7094 7.23017C13.9965 6.93159 14.4713 6.92228 14.7698 7.20938C15.0684 7.49647 15.0777 7.97125 14.7906 8.26983L10.5406 12.7698C10.3992 12.9169 10.204 13 10 13C9.79599 13 9.60078 12.9169 9.45938 12.7698L5.20938 8.26983C4.92228 7.97125 4.93159 7.49647 5.23017 7.20938Z" fill-rule="evenodd" />
              </svg>
            </div></button>
          <div @click.away="open = false" class="absolute bg-[var(--kw-surface)] border border-[var(--kw-border)] bottom-full left-1/2 -translate-x-1/2 max-h-80 mb-2 overflow-y-auto rounded-2xl shadow-xl shadow-black/5 dark:shadow-black/20 w-40" x-cloak x-show="open">
            <div class="px-4 py-2">
              <a class="text-[var(--kw-text-muted)] hover:text-[var(--kw-text)] text-sm inline-flex transition-colors" href="#de"> Deutsch </a>
            </div>
            <div class="px-4 py-2">
              <a class="text-[var(--kw-text-muted)] hover:text-[var(--kw-text)] text-sm inline-flex transition-colors" href="#fr"> Français </a>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </body>
</html>
